# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy PHP app to Azure Web App - churchcrm

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: pdo_mysql, mysqli, gd, zip, gettext, iconv, mbstring, xml, curl, fileinfo, bcmath

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"
          cache: "npm"

      - name: Install npm dependencies
        run: npm ci

      - name: Install Composer dependencies
        run: |
          cd src
          composer validate --no-check-publish
          composer install --no-dev --no-interaction --prefer-dist

      - name: Build app
        run: npm run build

      - name: Zip artifact for deployment
        run: zip -r release.zip src/ -x 'src/logs/*'

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v6
        with:
          name: php-app
          path: release.zip

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v6
        with:
          name: php-app

      - name: Unzip artifact for deployment
        run: unzip release.zip -d release

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E316C0DA689643A3B907EA97869A4F20 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A01608FEAC814C579983233AC2846202 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_435E3731C8204FB0879434C3C7977504 }}

      - name: "Deploy to Azure Web App"
        uses: azure/webapps-deploy@v3
        id: deploy-to-webapp
        with:
          app-name: "churchcrm"
          slot-name: "Production"
          package: release/src

      - name: Configure startup command
        run: az webapp config set --name churchcrm --resource-group churchcrm --startup-file "cp /home/site/wwwroot/default /etc/nginx/sites-enabled/default && service nginx restart" > /dev/null
